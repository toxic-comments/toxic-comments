version: "3.9"

services:
  web:
    build: .
    container_name: toxic-comments-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://admin:admin@db:5432/postgres
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: toxic-comments-dp
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
