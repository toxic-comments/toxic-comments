version: "3.9"

services:
  web:
    build: .
    container_name: toxic-comments-app
    restart: always
    ports:
      - "80:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/toxic-comments
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: toxic-comments-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toxic-comments
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
